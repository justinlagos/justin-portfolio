<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio CMS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        .login-container {
            background-color: #252525;
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-container h1 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        input[type="number"],
        input[type="color"],
        input[type="range"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 4px;
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #C8622A;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
        }

        input[type="color"] {
            cursor: pointer;
            height: 50px;
            padding: 4px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background-color: #C8622A;
            color: #ffffff;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        button:hover {
            background-color: #d97535;
        }

        button.danger {
            background-color: #dc2626;
        }

        button.danger:hover {
            background-color: #b91c1c;
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid #404040;
            color: #ffffff;
        }

        button.secondary:hover {
            background-color: #252525;
        }

        .admin-container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            width: 250px;
            background-color: #252525;
            border-right: 1px solid #404040;
            overflow-y: auto;
            padding: 20px 0;
        }

        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-size: 14px;
        }

        .sidebar-item:hover {
            background-color: #2d2d2d;
            border-left-color: #C8622A;
        }

        .sidebar-item.active {
            background-color: #2d2d2d;
            border-left-color: #C8622A;
            color: #C8622A;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #252525;
            border-bottom: 1px solid #404040;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-bar {
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 4px;
            padding: 10px 15px;
            width: 250px;
            color: #ffffff;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .table-container {
            background-color: #252525;
            border: 1px solid #404040;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2d2d2d;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 1px solid #404040;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #404040;
            font-size: 14px;
        }

        tr:hover {
            background-color: #2d2d2d;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            padding: 8px 12px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888888;
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-backdrop.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 60px;
        }

        .modal {
            background-color: #252525;
            border: 1px solid #404040;
            border-radius: 8px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #404040;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #ffffff;
        }

        .modal-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #404040;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            max-width: 400px;
        }

        .toast {
            background-color: #252525;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #dc2626;
        }

        .toast.warning {
            border-left: 4px solid #f59e0b;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .image-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #404040;
        }

        .upload-zone {
            border: 2px dashed #404040;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            background-color: #1a1a1a;
        }

        .upload-zone:hover {
            border-color: #C8622A;
        }

        .upload-zone.dragover {
            border-color: #C8622A;
            background-color: #2d2d2d;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.published {
            background-color: #10b98133;
            color: #10b981;
        }

        .status-badge.draft {
            background-color: #f59e0b33;
            color: #f59e0b;
        }

        .status-badge.archived {
            background-color: #6b7280;
            color: #ffffff;
        }

        .visibility-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background-color: #10b98133;
            color: #10b981;
        }

        .visibility-badge.hidden {
            background-color: #6b728033;
            color: #9ca3af;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background-color: #404040;
            border-radius: 14px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .toggle-switch.on {
            background-color: #10b981;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }

        .toggle-switch.on::after {
            left: 24px;
        }

        .metric-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .metric-row input {
            flex: 1;
        }

        .metric-row button {
            padding: 10px 15px;
            white-space: nowrap;
        }

        .color-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #404040;
            vertical-align: middle;
            margin-right: 8px;
        }

        .bulk-upload-queue {
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
        }

        .upload-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #404040;
            font-size: 13px;
        }

        .upload-item:last-child {
            border-bottom: none;
        }

        .upload-progress {
            width: 100px;
            height: 6px;
            background-color: #404040;
            border-radius: 3px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background-color: #C8622A;
            width: 0%;
            transition: width 0.2s;
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #404040;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 0;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 600;
        }

        .tab:hover {
            color: #C8622A;
        }

        .tab.active {
            border-bottom-color: #C8622A;
            color: #C8622A;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .chart-bars {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-label {
            width: 200px;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chart-value {
            width: 50px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
        }

        .chart-bar-bg {
            flex: 1;
            height: 24px;
            background-color: #2d2d2d;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .chart-bar-fill {
            height: 100%;
            background-color: #C8622A;
            transition: width 0.3s ease-out;
        }

        .confirmation-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #252525;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 30px;
            max-width: 400px;
            z-index: 2000;
        }

        .confirmation-dialog.active {
            display: block;
        }

        .confirmation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1999;
        }

        .confirmation-overlay.active {
            display: block;
        }

        .confirmation-dialog h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .confirmation-dialog p {
            margin-bottom: 25px;
            color: #aaaaaa;
            font-size: 14px;
        }

        .confirmation-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #404040;
                overflow-x: auto;
                padding: 0;
                display: flex;
                gap: 0;
            }

            .sidebar-item {
                padding: 15px 20px;
                white-space: nowrap;
                border-left: none;
                border-bottom: 3px solid transparent;
            }

            .sidebar-item:hover,
            .sidebar-item.active {
                border-left: none;
                border-bottom-color: #C8622A;
            }

            .admin-container {
                flex-direction: column;
                gap: 0;
            }

            .search-bar {
                width: 150px;
            }

            .header-right {
                flex-wrap: wrap;
                gap: 10px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .modal-header {
                padding: 15px;
            }

            .modal-content {
                padding: 15px;
            }

            .modal-footer {
                padding: 15px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #505050;
        }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-container">
        <h1>Portfolio CMS</h1>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@portfolio.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button onclick="login()">Sign In</button>
        <p style="margin-top: 20px; color: #888888; font-size: 12px;">Demo: Use any email/password to test</p>
    </div>
</div>

<div class="admin-container" id="adminContainer" style="display: none;">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item active" onclick="showSection('dashboard')">Dashboard</div>
        <div class="sidebar-item" onclick="showSection('brands')">Brands</div>
        <div class="sidebar-item" onclick="showSection('projects')">Projects</div>
        <div class="sidebar-item" onclick="showSection('project-media')">Project Media</div>
        <div class="sidebar-item" onclick="showSection('case-studies')">Case Studies</div>
        <div class="sidebar-item" onclick="showSection('pages')">Pages</div>
        <div class="sidebar-item" onclick="showSection('credentials')">Credentials</div>
        <div class="sidebar-item" onclick="showSection('products')">Products</div>
        <div class="sidebar-item" onclick="showSection('clients')">Clients</div>
        <div class="sidebar-item" onclick="showSection('countries')">Countries</div>
        <div class="sidebar-item" onclick="showSection('stats')">Stats</div>
        <div class="sidebar-item" onclick="showSection('social-links')">Social Links</div>
        <div class="sidebar-item" onclick="showSection('style-controls')">Style Controls</div>
        <div class="sidebar-item" onclick="showSection('site-settings')">Site Settings</div>
        <div class="sidebar-item" onclick="showSection('analytics')">Analytics</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="sectionTitle">Dashboard</h2>
            <div class="header-right">
                <input type="text" class="search-bar" id="searchBar" placeholder="Search..." onkeyup="handleSearch()">
                <button onclick="window.open('/')">View Site</button>
                <button class="danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="content" id="content">
            <!-- Content will be injected here -->
        </div>
    </div>
</div>

<!-- Modals -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modalTitle">Edit Item</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-content" id="modalContent">
            <!-- Content injected here -->
        </div>
        <div class="modal-footer">
            <button class="secondary" onclick="closeModal()">Cancel</button>
            <button onclick="saveCurrentForm()">Save</button>
        </div>
    </div>
</div>

<!-- Confirmation Dialog -->
<div class="confirmation-overlay" id="confirmationOverlay" onclick="closeConfirmation()"></div>
<div class="confirmation-dialog" id="confirmationDialog">
    <h3>Confirm Action</h3>
    <p id="confirmationMessage">Are you sure?</p>
    <div class="confirmation-buttons">
        <button class="secondary" onclick="closeConfirmation()">Cancel</button>
        <button class="danger" onclick="executeConfirmation()">Delete</button>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
const SUPABASE_URL = 'https://cgzqnnssbijfpuymnoqe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnenFubnNzYmlqZnB1eW1ub3FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjIyODEsImV4cCI6MjA4OTc5ODI4MX0.eUpWahjSdumf7nOLXemgi_Qc6JrXHdR6fPoLfd-0r60';

let sb;
let currentUser = null;
let currentSection = 'dashboard';
let currentFormType = null;
let currentFormId = null;
let confirmCallback = null;
let imageUploadCounter = 0;

// Initialize Supabase
function initSupabase() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

// Auth functions
async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showToast('Please enter email and password', 'error');
        return;
    }

    try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            // Demo mode - allow any credentials
            currentUser = { email, id: 'demo-user' };
            showLoginUI(false);
            loadDashboard();
        } else {
            currentUser = data.user;
            showLoginUI(false);
            loadDashboard();
        }
    } catch (err) {
        // Demo mode
        currentUser = { email, id: 'demo-user' };
        showLoginUI(false);
        loadDashboard();
    }
}

function logout() {
    currentUser = null;
    showLoginUI(true);
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
}

function showLoginUI(show) {
    document.getElementById('loginScreen').style.display = show ? 'flex' : 'none';
    document.getElementById('adminContainer').style.display = show ? 'none' : 'flex';
}

// Section management
function showSection(section) {
    currentSection = section;
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');

    let title = section.charAt(0).toUpperCase() + section.slice(1).replace('-', ' ');
    document.getElementById('sectionTitle').textContent = title;

    switch(section) {
        case 'dashboard': loadDashboard(); break;
        case 'brands': loadBrands(); break;
        case 'projects': loadProjects(); break;
        case 'project-media': loadProjectMedia(); break;
        case 'case-studies': loadCaseStudies(); break;
        case 'pages': loadPages(); break;
        case 'credentials': loadCredentials(); break;
        case 'products': loadProducts(); break;
        case 'clients': loadClients(); break;
        case 'countries': loadCountries(); break;
        case 'stats': loadStats(); break;
        case 'social-links': loadSocialLinks(); break;
        case 'style-controls': loadStyleControls(); break;
        case 'site-settings': loadSiteSettings(); break;
        case 'analytics': loadAnalytics(); break;
    }
}

// Dashboard
async function loadDashboard() {
    let html = `
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
                <div style="font-size: 12px; color: #888888; margin-bottom: 10px;">Total Projects</div>
                <div id="totalProjects" style="font-size: 28px; font-weight: 700;">-</div>
            </div>
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
                <div style="font-size: 12px; color: #888888; margin-bottom: 10px;">Total Brands</div>
                <div id="totalBrands" style="font-size: 28px; font-weight: 700;">-</div>
            </div>
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
                <div style="font-size: 12px; color: #888888; margin-bottom: 10px;">Published Projects</div>
                <div id="publishedProjects" style="font-size: 28px; font-weight: 700;">-</div>
            </div>
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
                <div style="font-size: 12px; color: #888888; margin-bottom: 10px;">Total Views</div>
                <div id="totalViews" style="font-size: 28px; font-weight: 700;">-</div>
            </div>
        </div>

    const projectId = document.getElementById('mediaProject').value;
    if (!projectId) {
        showToast('Please select a project first', 'error');
        return;
    }

    const uploadQueue = document.getElementById('uploadQueue');
    const uploadItems = document.getElementById('uploadItems');
    uploadQueue.style.display = 'block';
    uploadItems.innerHTML = '';

    let uploadedCount = 0;

    Array.from(files).forEach((file, index) => {
        if (!file.type.startsWith('image/')) {
            showToast(`${file.name} is not an image`, 'error');
            return;
        }

        if (file.size > 5 * 1024 * 1024) {
            showToast(`${file.name} is too large`, 'error');
            return;
        }

        const itemId = `upload-${Date.now()}-${index}`;
        uploadItems.innerHTML += `
            <div class="upload-item" id="${itemId}">
                <span>${file.name}</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="upload-progress">
                        <div class="upload-progress-bar" id="progress-${itemId}"></div>
                    </div>
                    <span style="width: 40px; text-align: right;">0%</span>
                </div>
            </div>
        `;

        uploadMedia(file, projectId, itemId);
    });
}

async function uploadMedia(file, projectId, itemId) {
    try {
        const fileName = `project-media-${Date.now()}-${Math.random()}.${file.name.split('.').pop()}`;

        // Simulate upload progress
        const progressBar = document.getElementById(`progress-${itemId}`);
        for (let i = 0; i <= 100; i += 20) {
            progressBar.style.width = i + '%';
            await new Promise(r => setTimeout(r, 100));
        }

        const { data, error } = await sb.storage.from('portfolio-images').upload(fileName, file);
        if (error) throw error;

        const { data: urlData } = sb.storage.from('portfolio-images').getPublicUrl(fileName);
        const imageUrl = urlData.publicUrl;

        await sb.from('project_media').insert({
            project_id: projectId,
            image_url: imageUrl,
            caption: file.name,
            alt_text: '',
            sort_order: 0,
            is_cover: false
        });

        progressBar.style.width = '100%';
        document.getElementById(itemId).style.opacity = '0.6';

    } catch (err) {
        showToast(`Upload failed: ${file.name}`, 'error');
    }
}

// Style Controls
async function loadStyleControls() {
    const { data: settings } = await sb.from('style_settings').select('*').order('category, sort_order');

    if (!settings || settings.length === 0) {
        document.getElementById('content').innerHTML = '<div class="empty-state">No style settings found.</div>';
        return;
    }

    const grouped = {};
    settings.forEach(s => {
        if (!grouped[s.category]) grouped[s.category] = [];
        grouped[s.category].push(s);
    });

    let html = '';
    Object.entries(grouped).forEach(([category, items]) => {
        html += `
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px; margin-bottom: 20px;">
                <h3 style="margin-bottom: 15px;">${category}</h3>
        `;

        items.forEach(setting => {
            html += `<div class="form-group">`;
            html += `<label>${setting.key}</label>`;

            if (setting.type === 'color') {
                html += `<input type="color" id="style-${setting.id}" value="${setting.value || '#000000'}" onchange="saveStyleSetting('${setting.id}', this.value)">`;
            } else if (setting.type === 'range') {
                html += `<div style="display: flex; gap: 10px; align-items: center;">
                    <input type="range" id="style-${setting.id}" value="${setting.value || 0}" min="0" max="100" onchange="saveStyleSetting('${setting.id}', this.value)">
                    <span id="value-${setting.id}" style="min-width: 50px;">${setting.value || 0}</span>
                </div>`;
            } else if (setting.type === 'select') {
                html += `<select id="style-${setting.id}" onchange="saveStyleSetting('${setting.id}', this.value)">`;
                if (setting.options) {
                    Object.entries(setting.options).forEach(([key, val]) => {
                        html += `<option value="${val}" ${setting.value === val ? 'selected' : ''}>${key}</option>`;
                    });
                }
                html += `</select>`;
            } else if (setting.type === 'toggle') {
                html += `<button class="toggle-switch ${setting.value ? 'on' : ''}" id="style-${setting.id}" onclick="saveStyleSetting('${setting.id}', !this.classList.contains('on')); this.classList.toggle('on');"></button>`;
            } else {
                html += `<input type="text" id="style-${setting.id}" value="${setting.value || ''}" onchange="saveStyleSetting('${setting.id}', this.value)">`;
            }

            html += `</div>`;
        });

        html += `</div>`;
    });

    document.getElementById('content').innerHTML = html;
}

async function saveStyleSetting(settingId, value) {
    try {
        await sb.from('style_settings').update({ value }).eq('id', settingId);
        showToast('Setting updated', 'success');
    } catch (err) {
        showToast('Save failed: ' + err.message, 'error');
    }
}

// Analytics
async function loadAnalytics() {
    const { data: events } = await sb.from('analytics_events').select('*').order('created_at', { ascending: false });
    const { data: projects } = await sb.from('projects').select('*');

    let html = `
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
                <div style="font-size: 12px; color: #888888; margin-bottom: 10px;">Total Events</div>
                <div style="font-size: 28px; font-weight: 700;">${events?.length || 0}</div>
            </div>
            <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
                <div style="font-size: 12px; color: #888888; margin-bottom: 10px;">Projects Viewed</div>
                <div style="font-size: 28px; font-weight: 700;">${new Set(events?.map(e => e.project_id)).size || 0}</div>
            </div>
        </div>

        <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px; margin-bottom: 40px;">
            <h3 style="margin-bottom: 20px;">Views by Project</h3>
            <div class="chart-bars">
    `;

    if (events && events.length > 0) {
        const projectViews = {};
        events.forEach(e => {
            if (e.project_id) {
                projectViews[e.project_id] = (projectViews[e.project_id] || 0) + 1;
            }
        });

        const maxViews = Math.max(...Object.values(projectViews));

        Object.entries(projectViews).forEach(([projectId, views]) => {
            const project = projects?.find(p => p.id === projectId);
            const percentage = (views / maxViews) * 100;

            html += `
                <div class="chart-bar">
                    <div class="chart-label">${project?.title || 'Unknown'}</div>
                    <div class="chart-value">${views}</div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                </div>
            `;
        });
    } else {
        html += '<p style="color: #888888;">No analytics data yet.</p>';
    }

    html += `
            </div>
        </div>

        <div style="background-color: #252525; border: 1px solid #404040; border-radius: 8px; padding: 20px;">
            <h3 style="margin-bottom: 20px;">Recent Events</h3>
            <div style="max-height: 400px; overflow-y: auto;">
    `;

    if (events && events.length > 0) {
        html += '<table style="font-size: 13px;"><tbody>';
        events.slice(0, 50).forEach(e => {
            const project = projects?.find(p => p.id === e.project_id);
            html += `<tr>
                <td style="padding: 10px; border-bottom: 1px solid #404040;">${e.event_type}</td>
                <td style="padding: 10px; border-bottom: 1px solid #404040;">${project?.title || '-'}</td>
                <td style="padding: 10px; border-bottom: 1px solid #404040; color: #888888; font-size: 12px;">${new Date(e.created_at).toLocaleString()}</td>
            </tr>`;
        });
        html += '</tbody></table>';
    }

    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
}

// Modal functions
function closeModal(event) {
    if (event && event.target !== document.getElementById('modalBackdrop')) return;
    document.getElementById('modalBackdrop').classList.remove('active');
}

async function saveCurrentForm() {
    switch(currentFormType) {
        case 'brand': saveBrand(); break;
        case 'project': saveProject(); break;
        case 'media': saveMedia(); break;
        case 'media-upload': saveMediaUpload(); break;
        case 'case-study': saveCaseStudy(); break;
        case 'page': savePage(); break;
        case 'credential': saveCredential(); break;
        case 'product': saveProduct(); break;
        case 'client': saveClient(); break;
        case 'country': saveCountry(); break;
        case 'stat': saveStat(); break;
        case 'social-link': saveSocialLink(); break;
    }
}

function saveMediaUpload() {
    showToast('Media uploaded successfully', 'success');
    closeModal();
    loadProjectMedia();
}

// Delete confirmation
function confirmDelete(type, id) {
    document.getElementById('confirmationMessage').textContent = `Are you sure you want to delete this ${type}? This action cannot be undone.`;
    document.getElementById('confirmationDialog').classList.add('active');
    document.getElementById('confirmationOverlay').classList.add('active');

    confirmCallback = () => deleteItem(type, id);
}

function closeConfirmation() {
    document.getElementById('confirmationDialog').classList.remove('active');
    document.getElementById('confirmationOverlay').classList.remove('active');
    confirmCallback = null;
}

function executeConfirmation() {
    if (confirmCallback) confirmCallback();
    closeConfirmation();
}

async function deleteItem(type, id) {
    try {
        const tableMap = {
            'brand': 'brands',
            'project': 'projects',
            'media': 'project_media',
            'case-study': 'case_studies',
            'credential': 'credentials',
            'product': 'products',
            'client': 'clients',
            'country': 'countries',
            'stat': 'stats',
            'social-link': 'social_links'
        };

        const table = tableMap[type];
        if (!table) return;

        await sb.from(table).delete().eq('id', id);
        showToast(`${type} deleted successfully`, 'success');

        // Reload current section
        showSection(currentSection);
    } catch (err) {
        showToast('Delete failed: ' + err.message, 'error');
    }
}

// Search
function handleSearch() {
    const query = document.getElementById('searchBar').value.toLowerCase();
    if (!query) return;

    document.querySelectorAll('table tbody tr').forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(query) ? '' : 'none';
    });
}

// Toast notifications
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;

    container.appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveCurrentForm();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('searchBar').focus();
    }
    if (e.key === 'Escape') {
        closeModal();
        closeConfirmation();
    }
});

// Initialize
initSupabase();
</script>
